openapi: 3.0.1
info:
  title: 默认模块
  description: >
    基于 AI 的校园组队匹配平台基础接口规范。

    包含账户认证、项目招募、人才广场、消息中心、团队管理、公共社区及后台管理功能。


    **附录：WebSocket 消息协议**

    * 连接地址: `wss://api.team-matching.com/ws?token=<jwt_token>`

    * 由于 OpenAPI 3.0 规范主要针对 HTTP RESTful 接口，WebSocket 的定义已在说明中备注，请在客户端单独建立 WS
    连接。
  version: 1.0.0
tags:
  - name: 1. 基础账户与风控体系
  - name: 2. 项目广场
  - name: 3. 人才广场
  - name: 4. 消息中心
  - name: 5. 我的团队
  - name: 6. 公共社区
  - name: 7. 管理员后台
  - name: 8. 通用接口
  - name: 基础账户
  - name: 项目广场
  - name: 人才广场
  - name: 消息中心
  - name: 我的团队
  - name: 公共社区
  - name: 通用接口
  - name: 管理员后台
paths:
  /auth/register:
    post:
      summary: 邮箱/手机号注册
      deprecated: false
      description: 对应功能 F-01，支持手机号或邮箱注册
      operationId: register
      tags:
        - 1. 基础账户与风控体系
        - 基础账户
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - password
                - verifyCode
              properties:
                account:
                  type: string
                  description: 邮箱或手机号
                  example: student@example.com
                password:
                  type: string
                  description: 密码(6-20位)
                  format: password
                  example: password123
                nickname:
                  type: string
                  description: 用户昵称
                  example: 张三
                verifyCode:
                  type: string
                  description: 6位验证码
                  example: '123456'
        required: true
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                            example: 10001
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIs...
                          expiresIn:
                            type: integer
                            example: 7200
                          authStatus:
                            type: integer
                            description: 认证状态：0-待审核 1-已通过 2-未认证(新注册用户)
                            enum:
                              - 0
                              - 1
                              - 2
                            example: 2
          headers: {}
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
          headers: {}
      security: []
  /auth/verify:
    post:
      summary: 提交身份认证
      deprecated: false
      description: 对应功能 F-03，提交校园身份认证信息（包含证明材料）
      operationId: submitAuth
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - studentId
                - realName
                - major
                - grade
                - email
                - materialFileIds
              properties:
                studentId:
                  type: string
                  description: 学号
                  example: '20210001'
                realName:
                  type: string
                  description: 真实姓名
                  example: 张三
                major:
                  type: string
                  description: 专业
                  example: 计算机科学与技术
                grade:
                  type: string
                  description: 年级（如：2021级）
                  example: 2021级
                email:
                  type: string
                  description: 校园邮箱
                  example: zhangsan@stu.edu.cn
                materialFileIds:
                  type: array
                  description: 认证材料文件ID列表（通过上传接口获取，targetType=8）
                  items:
                    type: integer
                  example:
                    - 10009
                    - 10010
                materialTypes:
                  type: array
                  description: 材料类型列表（与fileIds一一对应）：1-学生证 2-身份证 3-校园卡 4-学信网证明
                  items:
                    type: integer
                    enum:
                      - 1
                      - 2
                      - 3
                      - 4
                  example:
                    - 1
                    - 2
        required: true
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      authId:
                        type: integer
                        example: 10001
                      message:
                        type: string
                        example: 认证申请提交成功，等待审核
                      authStatus:
                        type: integer
                        enum:
                          - 0
                          - 1
                          - 2
                        example: 0
          headers: {}
      security:
        - token: []
  /auth/wx-login:
    post:
      summary: 微信一键登录
      deprecated: false
      description: 对应功能 F-01，微信OAuth 2.0一键登录
      operationId: wxLogin
      tags:
        - 1. 基础账户与风控体系
        - 基础账户
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 微信临时登录凭证
                  example: 071JtF0w3SxDek2CO04w3jJCw03JtF0g
                encryptedData:
                  type: string
                  description: 加密数据(前端加密)
                  example: encryptedDataString
                iv:
                  type: string
                  description: 加密算法的初始向量
                  example: ivString
        required: true
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                            example: 10001
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIs...
                          expiresIn:
                            type: integer
                            example: 7200
                          isNewUser:
                            type: boolean
                            description: 是否是新用户（true表示需引导绑定手机号/邮箱）
                            example: false
                          authStatus:
                            type: integer
                            description: 认证状态：0-待审核 1-已通过 2-未认证
                            enum:
                              - 0
                              - 1
                              - 2
                            example: 2
          headers: {}
      security: []
  /auth/status:
    get:
      summary: 查询认证状态
      deprecated: false
      description: 查询当前用户的身份认证状态及材料信息
      operationId: getAuthStatus
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      authStatus:
                        type: integer
                        description: 0-待审核 1-已通过 2-已驳回
                        enum:
                          - 0
                          - 1
                          - 2
                        example: 0
                      auditTime:
                        type: string
                        format: date-time
                        description: 审核时间
                        example: '2024-01-15T10:30:00Z'
                      remark:
                        type: string
                        description: 审核备注/驳回原因
                        example: 学号信息不匹配
                      materials:
                        type: array
                        description: 已上传的认证材料
                        items:
                          type: object
                          properties:
                            materialId:
                              type: integer
                              example: 1
                            materialType:
                              type: integer
                              description: 1-学生证 2-身份证 3-校园卡 4-学信网证明
                              enum:
                                - 1
                                - 2
                                - 3
                                - 4
                              example: 1
                            fileInfo:
                              type: object
                              properties:
                                fileId:
                                  type: integer
                                  example: 10009
                                fileName:
                                  type: string
                                  example: 学生证_张三.jpg
                                fileUrl:
                                  type: string
                                  example: https://example.com/files/2024/01/abc123.jpg
                                fileSize:
                                  type: integer
                                  example: 2048576
                            auditStatus:
                              type: integer
                              description: 材料审核状态：0-待审核 1-已通过 2-已驳回
                              enum:
                                - 0
                                - 1
                                - 2
                              example: 0
                            remark:
                              type: string
                              example: ''
                            createdTime:
                              type: string
                              format: date-time
                              example: '2024-01-01T10:00:00Z'
                      applyTime:
                        type: string
                        format: date-time
                        example: '2024-01-01T10:00:00Z'
          headers: {}
      security:
        - token: []
  /auth/login:
    post:
      summary: 密码登录
      deprecated: false
      description: 对应功能 F-01，使用账号密码登录
      operationId: login
      tags:
        - 1. 基础账户与风控体系
        - 基础账户
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - password
              properties:
                account:
                  type: string
                  description: 邮箱/手机号/学号
                  example: student@example.com
                password:
                  type: string
                  description: 密码
                  format: password
                  example: password123
        required: true
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          userId:
                            type: integer
                            example: 10001
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIs...
                          expiresIn:
                            type: integer
                            example: 7200
                          authStatus:
                            type: integer
                            description: 认证状态：0-待审核 1-已通过 2-未认证
                            enum:
                              - 0
                              - 1
                              - 2
                            example: 1
          headers: {}
      security: []
  /user/profile:
    get:
      summary: 获取个人资料
      deprecated: false
      description: 对应功能 F-04，获取当前用户的详细资料
      operationId: getUserProfile
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      userId:
                        type: integer
                        example: 10001
                      studentId:
                        type: string
                        example: '20210001'
                      username:
                        type: string
                        example: 张三
                      nickname:
                        type: string
                        example: 张三
                      avatarFile:
                        type: object
                        properties:
                          fileId:
                            type: integer
                            example: 10001
                          fileName:
                            type: string
                            example: avatar_张三.jpg
                          fileUrl:
                            type: string
                            example: https://example.com/avatar/10001.jpg
                          fileSize:
                            type: integer
                            example: 102400
                      gender:
                        type: integer
                        enum:
                          - 0
                          - 1
                          - 2
                        example: 1
                      birthday:
                        type: string
                        format: date
                        example: '2000-01-01'
                      major:
                        type: string
                        example: 计算机科学与技术
                      grade:
                        type: string
                        example: 2021级
                      email:
                        type: string
                        example: zhangsan@stu.edu.cn
                      phone:
                        type: string
                        example: 138****1234
                      techStack:
                        type: string
                        example: Python,Java,机器学习
                      personalIntro:
                        type: string
                        example: 热爱编程，有多个项目经验
                      awardExperience:
                        type: string
                        example: 2023年挑战杯省赛一等奖
                      authStatus:
                        type: integer
                        enum:
                          - 0
                          - 1
                          - 2
                        example: 1
                      isTalentVisible:
                        type: boolean
                        example: true
                      createdTime:
                        type: string
                        format: date-time
                        example: '2023-09-01T10:00:00Z'
          headers: {}
      security:
        - token: []
    put:
      summary: 更新个人资料
      deprecated: false
      description: 对应功能 F-04，更新当前用户的个人资料
      operationId: updateUserProfile
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                  description: 用户昵称
                  example: 张三
                avatarFileId:
                  type: integer
                  description: 头像文件ID（通过上传接口获取，targetType=7）
                  example: 10001
                gender:
                  type: integer
                  description: 性别：0-未知 1-男 2-女
                  enum:
                    - 0
                    - 1
                    - 2
                  example: 1
                birthday:
                  type: string
                  format: date
                  description: 出生日期
                  example: '2000-01-01'
                major:
                  type: string
                  description: 专业
                  example: 软件工程
                grade:
                  type: string
                  description: 年级
                  example: 2022级
                techStack:
                  type: string
                  description: 技术栈（逗号分隔）
                  example: Python,Java,机器学习
                personalIntro:
                  type: string
                  description: 个人简介
                  example: 热爱编程，有多个项目经验
                awardExperience:
                  type: string
                  description: 获奖经历
                  example: 2023年挑战杯省赛一等奖
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: 更新成功
          headers: {}
      security:
        - token: []
  /auth/send-code:
    post:
      summary: 发送验证码
      deprecated: false
      description: 发送邮箱或手机验证码。对于后缀为 `.edu.cn` 的学校邮箱，可配合学生邮箱认证接口完成学生身份认证。
      operationId: sendCode
      tags:
        - 1. 基础账户与风控体系
        - 基础账户
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - target
                - type
              properties:
                target:
                  type: string
                  description: 邮箱或手机号
                  example: student@example.com
                type:
                  type: string
                  description: 类型：register/login/reset/auth（auth 表示学生邮箱认证）
                  enum:
                    - register
                    - login
                    - reset
                    - auth
                  example: register
        required: true
      responses:
        '200':
          description: 成功发送
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: 验证码发送成功
                          expireIn:
                            type: integer
                            description: 验证码有效期（秒）
                            example: 300
          headers: {}
      security: []
  /auth/forgot-password:
    post:
      summary: 找回密码
      deprecated: false
      description: 对应功能 F-02，通过验证码重置密码
      operationId: forgotPassword
      tags:
        - 1. 基础账户与风控体系
        - 基础账户
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - account
                - verifyCode
                - newPassword
              properties:
                account:
                  type: string
                  description: 邮箱或手机号
                  example: student@example.com
                verifyCode:
                  type: string
                  description: 6位验证码
                  example: '123456'
                newPassword:
                  type: string
                  description: 新密码(6-20位)
                  format: password
                  example: newPassword123
        required: true
      responses:
        '200':
          description: 密码重置成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          message:
                            type: string
                            example: 密码重置成功
          headers: {}
      security: []
  /user/skill-cert:
    post:
      summary: 添加技能认证
      deprecated: false
      description: 对应功能 F-05，添加技能认证证书
      operationId: addSkillCert
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - skillName
                - certName
                - certFileId
                - issueDate
              properties:
                skillName:
                  type: string
                  description: 技能名称
                  example: Python
                certName:
                  type: string
                  description: 证书名称
                  example: Python 二级证书
                certFileId:
                  type: integer
                  description: 证书文件ID（通过上传接口获取，targetType=2）
                  example: 10002
                issueDate:
                  type: string
                  format: date
                  description: 发证日期
                  example: '2023-06-01'
                issuer:
                  type: string
                  description: 发证机构
                  example: 教育部考试中心
                certNumber:
                  type: string
                  description: 证书编号
                  example: '20230601123456'
                description:
                  type: string
                  description: 证书描述
                  example: 全国计算机等级考试二级Python
        required: true
      responses:
        '200':
          description: 添加成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      certId:
                        type: integer
                        example: 101
                      message:
                        type: string
                        example: 添加成功，等待审核
                      auditStatus:
                        type: integer
                        enum:
                          - 0
                          - 1
                          - 2
                        example: 0
          headers: {}
      security:
        - token: []
    get:
      summary: 获取技能认证列表
      deprecated: false
      description: 对应功能 F-05，获取当前用户的技能认证列表
      operationId: getSkillCertList
      tags:
        - 1. 基础账户与风控体系
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        certId:
                          type: integer
                          example: 101
                        skillName:
                          type: string
                          example: Python
                        certName:
                          type: string
                          example: Python 二级证书
                        certFile:
                          type: object
                          properties:
                            fileId:
                              type: integer
                              example: 10002
                            fileName:
                              type: string
                              example: 二级证书_张三.pdf
                            fileUrl:
                              type: string
                              example: https://example.com/certs/10002.pdf
                            fileSize:
                              type: integer
                              example: 512000
                        issueDate:
                          type: string
                          format: date
                          example: '2023-06-01'
                        issuer:
                          type: string
                          example: 教育部考试中心
                        certNumber:
                          type: string
                          example: '20230601123456'
                        description:
                          type: string
                          example: 全国计算机等级考试二级Python
                        auditStatus:
                          type: integer
