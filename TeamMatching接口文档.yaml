components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 状态码（200成功，400业务错误，401未认证，403禁止访问，404不存在，500系统错误）
          example: 200
        message:
          type: string
          description: 提示信息
          example: success
        data:
          type: object
          description: 业务数据
          properties: {}
          nullable: true
          example: {}
    StompSendMessageRequest:
      type: object
      description: 通过 STOMP 发送聊天消息的请求体
      required:
        - senderId
        - sessionId
        - receiverId
        - content
        - msgType
      properties:
        senderId:
          type: integer
          format: int32
          description: 发送方用户ID
          example: 10001
        sessionId:
          type: integer
          format: int32
          description: 会话ID
          example: 501
        receiverId:
          type: integer
          format: int32
          description: 接收方用户ID（会话的另一个参与者）
          example: 10002
        content:
          type: string
          description: 消息内容
          example: 你好，我对你的项目很感兴趣
        msgType:
          type: integer
          format: int32
          description: 消息类型：1-文字 2-图片 3-系统通知 4-投递卡片 5-邀请卡片
          example: 1
    ChatMessageResponse:
      type: object
      description: 通过 /topic/chat/{sessionId} 推送的单条消息结构
      properties:
        messageId:
          type: integer
          format: int64
          description: 消息ID
          example: 801
        senderId:
          type: integer
          format: int32
          description: 发送方ID
          example: 10001
        senderNickname:
          type: string
          description: 发送方昵称
          example: 张三
        senderAvatar:
          type: string
          description: 发送方头像（文件ID或URL），可能为 null
          nullable: true
          example: '12345'
        content:
          type: string
          description: 消息内容
          example: 你好
        msgType:
          type: integer
          format: int32
          description: 消息类型：1-文字 2-图片 3-系统通知 4-投递卡片 5-邀请卡片
          example: 1
        status:
          type: integer
          format: int32
          description: 消息状态：0-未读 1-已读 2-撤回
          example: 0
        sendTime:
          type: string
          format: date-time
          description: 发送时间（UTC）
          example: '2026-03-13T14:15:22.123Z'
    ProjectListItem:
      type: object
      properties:
        projectId:
          type: integer
          description: 项目ID
        name:
          type: string
          description: 项目名称
        belongTrack:
          type: string
          description: 所属赛道
        projectIntro:
          type: string
          description: 项目简介（截取）
        publisherInfo:
          type: object
          properties:
            nickname:
              type: string
              description: 发布人昵称
            avatar:
              type: string
              description: 发布人头像
        deadlineRecruit:
          type: string
          format: date-time
          description: 招募截止时间
        status:
          type: integer
          description: 项目状态：0-草拟 1-实施 2-招募中 3-完成 4-终止
        viewCount:
          type: integer
          description: 浏览次数
        favoriteCount:
          type: integer
          description: 收藏次数
        roleSummaries:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                description: 角色名
              memberQuota:
                type: integer
                description: 招募人数
              currentMembers:
                type: integer
                description: 已有人数
    TalentCardItem:
      type: object
      properties:
        cardId:
          type: integer
          description: 卡片ID
        userId:
          type: integer
          description: 用户ID
        displayName:
          type: string
          description: 展示姓名
        avatar:
          type: string
          description: 用户头像
        major:
          type: string
          description: 专业
        grade:
          type: string
          description: 年级
        cardTitle:
          type: string
