  /stomp/chat/send:
    post:
      summary: 通过 STOMP 发送聊天消息（文档用接口）
      deprecated: false
      description: |
        这是一个“文档占位”的 HTTP 接口，用来在 Apifox 中描述 **STOMP 发送消息** 的请求体结构。

        实际运行时：
        - 前端应通过 STOMP 发送到目的地：/app/chat/send
        - 请求体为本接口的 requestBody 中定义的 JSON 结构（StompSendMessageRequest）
        - 发送成功后，服务端会向主题 /topic/chat/{sessionId} 推送 ChatMessageResponse

        前端 STOMP 示例：
        stompClient.send('/app/chat/send', {}, JSON.stringify({
          senderId: 10001,
          sessionId: 501,
          receiverId: 10002,
          content: '你好',
          msgType: 1
        }));
      tags:
        - 4. 消息中心
      parameters:
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StompSendMessageRequest'
        required: true
      responses:
        '200':
          description: 实际 STOMP 调用无 HTTP 响应，此处仅做文档占位
          content:
            application/json:
              schema:
                type: object
                description: |
                  STOMP 发送后不会有真正的 HTTP 响应。
                  这里仅返回一个简要确认结构，方便在 Apifox 调试时查看。
                properties:
                  message:
                    type: string
                    example: sent via STOMP
          headers: {}
      security: []
  /stomp/topic/chat/{sessionId}:
    get:
      summary: 订阅聊天消息（文档用说明）
      deprecated: false
      description: |
        这是一个“文档占位”的 GET，用来在 Apifox 中描述 **订阅的消息体结构**。

        实际运行时：
        - 前端通过 STOMP 订阅：/topic/chat/{sessionId}
        - 每当有新消息时，服务端会推送 ChatMessageResponse

        前端 STOMP 示例：
        stompClient.subscribe('/topic/chat/501', frame => {
          const msg = JSON.parse(frame.body);
          // msg 结构即 ChatMessageResponse
        });
      tags:
        - 4. 消息中心
      parameters:
        - name: sessionId
          in: path
          description: 会话ID
          required: true
          example: 0
          schema:
            type: integer
            example: 501
        - name: Authorization
          in: header
          description: ''
          required: false
          example: Bearer {{token}}
          schema:
            type: string
            default: Bearer {{token}}
      responses:
        '200':
          description: 推送消息体结构说明
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageResponse'
          headers: {}
      security: []
